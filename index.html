<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PPT Anything - Demo Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh;
    background: #111;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    color: #eee;
  }

  .hero {
    text-align: center;
    padding: 64px 24px 32px;
  }
  .hero h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #f8b84e 0%, #6ec6ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    margin-top: 12px;
    font-size: 1rem;
    color: rgba(255,255,255,0.55);
    max-width: 560px;
    margin-left: auto; margin-right: auto;
    line-height: 1.6;
  }
  .hero .links {
    margin-top: 16px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
  }
  .hero .links a {
    color: #6ec6ff;
    text-decoration: none;
    transition: color 180ms;
  }
  .hero .links a:hover { color: #f8b84e; }

  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 32px;
    padding: 40px 24px 80px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .card {
    width: 440px;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 200ms ease, box-shadow 200ms ease;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    border-color: rgba(255,255,255,0.12);
  }
  .card .thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: #222;
  }
  .card .info {
    padding: 20px 24px;
  }
  .card .info h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card .info .meta {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.4);
  }
  .card .info .desc {
    margin-top: 8px;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.25);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
  .footer a:hover { color: #6ec6ff; }

  @media (max-width: 520px) {
    .card { width: 100%; }
    .hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>PPT Anything</h1>
  <p>AI 故事 PPT 引擎 -- 给一个主题，生成一套连贯、有人物、有审美、能直接讲的插画 PPT。</p>
  <p class="links">
    <a href="https://github.com/Crosery/ppt-anything">GitHub</a>
  </p>
</div>

<div class="gallery">

  <a class="card" href="ppt-anything-intro/">
    <img class="thumb" src="ppt-anything-intro/pptanything_s1.webp" alt="PPT Anything Intro">
    <div class="info">
      <h2>PPT Anything 介绍</h2>
      <div class="meta">7 slides / 2026-05-01</div>
      <div class="desc">用 PPT Anything 自身生成的项目介绍 -- AI 故事 PPT 引擎的功能与工作流演示。</div>
    </div>
  </a>

  <a class="card" href="harness-design/">
    <img class="thumb" src="harness-design/harness_s01.webp" alt="Claude Code Harness">
    <div class="info">
      <h2>Claude Code Harness 设计思想</h2>
      <div class="meta">35 slides / 2026-05-02</div>
      <div class="desc">Claude Code Harness 的设计思想与开源参考 -- 深入分析 AI 编程 CLI 的架构设计。</div>
    </div>
  </a>

</div>

<div class="footer">
  Built with <a href="https://github.com/Crosery/ppt-anything">ppt-anything</a>
</div>

</body>
</html>
